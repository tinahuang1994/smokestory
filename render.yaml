services:
  - type: web
    name: smokestory
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIRMS_MAP_KEY
        sync: false
      - key: EPA_AQS_EMAIL
        sync: false
      - key: EPA_AQS_KEY
        sync: false
      - key: GUARDIAN_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
